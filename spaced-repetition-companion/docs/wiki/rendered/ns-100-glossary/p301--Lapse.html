<h1>Glossary:Lapse</h1>
<main id="mw-content-text"><div class="mw-parser-output"><dl><dt><span id="Lapse">lapse</span></dt>
<dd>memory lapse is a failure to recall an <a href="p298--Item.html" title="Glossary:Item">item</a>. When we say "<i>number of lapses</i>", we mean the number of times an individual <a href="p298--Item.html" title="Glossary:Item">item</a> has been forgotten, i.e. scored less than <b>Pass (3)</b> in repetitions</dd></dl>
