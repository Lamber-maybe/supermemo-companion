<h1>Glossary:Leitner system</h1>
<main id="mw-content-text"><div class="mw-parser-output"><dl><dt><span id="Leitner_system">Leitner system</span></dt>
<dd>rudimentary method for <a href="p341--Spaced_repetition.html" title="Glossary:Spaced repetition">spaced repetition</a> used in a number of flashcard applications. The method has been proposed by <a class="external text" href="https://en.wikipedia.org/wiki/Sebastian_Leitner">Sebastian Leitner</a> in the 1970s and can be considered a forerunner of <a href="p345--SuperMemo.html" title="Glossary:SuperMemo">SuperMemo</a></dd></dl>
