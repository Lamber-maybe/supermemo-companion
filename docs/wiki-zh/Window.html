<title>Window — SuperMemo 帮助</title>
<style>
*{box-sizing:border-box}
body{font-family:Georgia,'Times New Roman',serif;max-width:1100px;margin:0 auto;padding:0 1.2em 2em;color:#202122;line-height:1.7}
h1,h2,h3,h4,h5{font-family:sans-serif}
a{color:#0645ad}a:visited{color:#0b0080}
table{border-collapse:collapse;margin:1em 0;width:100%}
td,th{border:1px solid #a2a9b1;padding:6px 10px;vertical-align:top}
th{background:#eaecf0;font-family:sans-serif}
img{max-width:100%;height:auto}
pre{background:#f8f9fa;border:1px solid #eaecf0;padding:1em;overflow-x:auto;white-space:pre-wrap}
code{background:#f8f9fa;padding:2px 4px;font-size:.9em}
.toc{background:#f8f9fa;border:1px solid #aaa;padding:1em;display:inline-block;min-width:200px;margin-bottom:1em}
.navbox{border:1px solid #aaa;margin:1em 0;padding:.5em;font-size:.9em}
.source-note{color:#888;font-size:.82em;border-bottom:1px solid #eee;padding-bottom:.5em;margin-bottom:1.2em}

/* ── language toolbar ── */
#lang-bar{
  position:sticky;top:0;z-index:100;
  background:#fff;border-bottom:2px solid #3b71ca;
  padding:.45em 1em;display:flex;align-items:center;gap:.6em;
  font-family:sans-serif;font-size:.88em;flex-wrap:wrap;
}
#lang-bar strong{margin-right:.4em;color:#333}
#lang-bar button{
  padding:.3em .9em;border:1px solid #3b71ca;border-radius:4px;
  background:#fff;color:#3b71ca;cursor:pointer;font-size:.9em;transition:all .15s;
}
#lang-bar button.active{background:#3b71ca;color:#fff}
#lang-bar button:hover:not(.active){background:#e8f0fb}
.mode-label{color:#666;font-size:.85em}

/* ── segment layout ── */
.seg{margin:0}

/* EN-only mode */
body.mode-en  .seg-zh{display:none}
body.mode-en  .seg-en{display:block}

/* ZH-only mode */
body.mode-zh  .seg-en{display:none}
body.mode-zh  .seg-zh{display:block}

/* Bilingual mode */
body.mode-bi  .seg{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid #f0f0f0}
body.mode-bi  .seg-en{padding:.15em 1em .15em 0;border-right:2px solid #e0e7ff}
body.mode-bi  .seg-zh{padding:.15em 0 .15em 1em;background:#fafffe}
body.mode-bi  .seg > :is(.seg-en,.seg-zh){display:block}
/* collapse extra margin in bi mode */
body.mode-bi  .seg > * > :is(h1,h2,h3,h4,p,ul,ol,table){margin-top:.3em;margin-bottom:.3em}
/* language label */
body.mode-bi  .seg-en::before{content:"EN";font-size:.7em;color:#888;font-family:sans-serif;display:block}
body.mode-bi  .seg-zh::before{content:"中文";font-size:.7em;color:#888;font-family:sans-serif;display:block}
</style>
</head>
<body class="mode-zh">
<div id="lang-bar">
  <strong>🌐</strong>
  <button data-mode="en" onclick="setMode('en')">English</button>
  <button data-mode="zh" onclick="setMode('zh')">中文</button>
  <button data-mode="bi" onclick="setMode('bi')">对照 Bilingual</button>
  <span style="flex:1"></span>
  <a href="https://help.supermemo.org/wiki/Window" style="color:#888;font-size:.85em;text-decoration:none">↗ 原文</a>
</div>

<script>
function setMode(m){
  document.body.className='mode-'+m;
  document.querySelectorAll('#lang-bar button').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===m);
  });
  localStorage.setItem('smLang', m);
}
(function(){
  var saved=localStorage.getItem('smLang')||'zh';
  setMode(saved);
})();
</script>
